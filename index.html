<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ひっぱり将棋 プロトタイプ</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #E2C275; /* 将棋盤風の色 */
    }
    canvas {
      display: block;
      touch-action: none; /* スマホでのスクロールを防止 */
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      font-family: sans-serif;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>
  <div id="ui">歩を引っ張って王にぶつけろ！</div>
  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // 画面サイズをスマホに合わせる
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // 駒のクラス
    class Piece {
      constructor(x, y, radius, text, isEnemy) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.radius = radius;
        this.text = text;
        this.isEnemy = isEnemy;
        this.mass = isEnemy ? 2 : 1; // 敵（王）は少し重くする
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.isEnemy ? '#ff9999' : '#ffe6b3';
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#000';
        ctx.font = `${this.radius}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.text, this.x, this.y);
      }

      update() {
        // 摩擦（徐々に減速）
        this.vx *= 0.98;
        this.vy *= 0.98;

        // 速度が極端に小さくなったら止める
        if (Math.abs(this.vx) < 0.1) this.vx = 0;
        if (Math.abs(this.vy) < 0.1) this.vy = 0;

        this.x += this.vx;
        this.y += this.vy;

        // 壁との衝突判定（跳ね返り）
        if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -0.8; }
        if (this.x + this.radius > canvas.width) { this.x = canvas.width - this.radius; this.vx *= -0.8; }
        if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -0.8; }
        if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy *= -0.8; }
      }
    }

    // ゲームの初期化
    const player = new Piece(canvas.width / 2, canvas.height * 0.8, 30, '歩', false);
    const enemy = new Piece(canvas.width / 2, canvas.height * 0.2, 40, '王', true);
    const pieces = [player, enemy];

    // 入力（ひっぱり）の管理
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let currentX = 0;
    let currentY = 0;

    // タッチ＆マウスイベントの設定
    canvas.addEventListener('pointerdown', (e) => {
      const dx = e.clientX - player.x;
      const dy = e.clientY - player.y;
      // プレイヤーの駒をタッチしたか判定
      if (Math.hypot(dx, dy) < player.radius && player.vx === 0 && player.vy === 0) {
        isDragging = true;
        dragStartX = player.x;
        dragStartY = player.y;
        currentX = e.clientX;
        currentY = e.clientY;
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      currentX = e.clientX;
      currentY = e.clientY;
    });

    canvas.addEventListener('pointerup', (e) => {
      if (!isDragging) return;
      isDragging = false;
      
      // 引っ張った距離と逆方向に速度を与える（パワー調整）
      const dx = player.x - currentX;
      const dy = player.y - currentY;
      player.vx = dx * 0.15;
      player.vy = dy * 0.15;
    });

    // 駒同士の衝突判定と反射（簡易的な円の衝突）
    function checkCollisions() {
      const dx = enemy.x - player.x;
      const dy = enemy.y - player.y;
      const distance = Math.hypot(dx, dy);
      const minDist = player.radius + enemy.radius;

      if (distance < minDist) {
        // 重なりを解消
        const overlap = minDist - distance;
        const nx = dx / distance;
        const ny = dy / distance;
        
        player.x -= nx * (overlap / 2);
        enemy.x += nx * (overlap / 2);

        // 運動量保存の法則を用いた簡易的な弾き合い
        const relativeVelocityX = player.vx - enemy.vx;
        const relativeVelocityY = player.vy - enemy.vy;
        const speed = relativeVelocityX * nx + relativeVelocityY * ny;

        if (speed > 0) {
          const restitution = 0.8; // 反発係数
          const impulse = (2 * speed) / (player.mass + enemy.mass);
          
          player.vx -= impulse * enemy.mass * nx * restitution;
          player.vy -= impulse * enemy.mass * ny * restitution;
          enemy.vx += impulse * player.mass * nx * restitution;
          enemy.vy += impulse * player.mass * ny * restitution;
        }
      }
    }

    // メインループ
    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 引っ張っている時のガイド線（軌道）を描画
      if (isDragging) {
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(currentX, currentY);
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.lineWidth = 5;
        ctx.stroke();
      }

      pieces.forEach(p => p.update());
      checkCollisions();
      pieces.forEach(p => p.draw());

      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
