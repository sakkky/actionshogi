<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>将棋テトリス昇天</title>
<style>
body { margin:0; background:#111; color:#fff; text-align:center; font-family:sans-serif;}
#ui { padding:10px; }
canvas { background:#222; touch-action:none; }
</style>
</head>
<body>

<div id="ui">
  <div>Score: <span id="score">0</span></div>
  <div>Combo: <span id="combo">0</span></div>
  <div>Time: <span id="time">180</span></div>
</div>

<canvas id="game"></canvas>

<script>
const COLS=5, ROWS=9;
let board = Array.from({length:ROWS},()=>Array(COLS).fill(null));

let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");
let size = 60;
canvas.width = COLS*size;
canvas.height = ROWS*size;

let score=0, combo=0, time=180;
let spawnQueue=[];

function randPiece(){
  let types=["歩","香","桂"];
  let t = Math.random()<0.08?"王":types[Math.floor(Math.random()*3)];
  return {type:t, owner:"enemy", state:"falling", promoted:false};
}

function initQueue(){
  while(spawnQueue.length<2){
    spawnQueue.push(randPiece());
  }
}

function spawnEnemy(){
  let piece = spawnQueue.shift();
  spawnQueue.push(randPiece());
  let x=Math.floor(Math.random()*COLS);
  if(board[0][x]) gameOver();
  board[0][x]=piece;
}

function applyGravity(){
  for(let y=ROWS-2;y>=0;y--){
    for(let x=0;x<COLS;x++){
      let c=board[y][x];
      if(c && c.owner==="enemy" && c.state==="falling"){
        if(!board[y+1][x]){
          board[y+1][x]=c;
          board[y][x]=null;
        }else{
          c.state="fixed";
        }
      }
    }
  }
}

function applyLineEffect(y){
  for(let x=0;x<COLS;x++){
    let c=board[y][x];
    if(!c) continue;

    if(c.type==="香"){
      for(let i=0;i<ROWS;i++) board[i][x]=null;
    }

    if(c.type==="桂"){
      for(let dx=-1;dx<=1;dx++){
        for(let dy=-1;dy<=1;dy++){
          let nx=x+dx, ny=y+dy;
          if(board[ny] && board[ny][nx]){
            board[ny][nx]=null;
          }
        }
      }
    }

    if(c.type==="王"){
      for(let yy=0;yy<ROWS;yy++){
        for(let xx=0;xx<COLS;xx++){
          if(board[yy][xx]?.owner==="enemy") board[yy][xx]=null;
        }
      }
    }
  }
}

function checkLines(){
  let cleared=0;

  for(let y=ROWS-1;y>=0;y--){
    if(board[y].every(c=>c)){
      applyLineEffect(y);
      board.splice(y,1);
      board.unshift(Array(COLS).fill(null));
      cleared++;
      y++;
    }
  }

  if(cleared>0){
    combo++;
    let base=[0,100,300,600][cleared]||1000;
    let mult = combo>=3?2:(combo===2?1.5:1);
    score += Math.floor(base*mult);
  }else{
    combo=0;
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      ctx.strokeStyle="#555";
      ctx.strokeRect(x*size,y*size,size,size);

      let c=board[y][x];
      if(c){
        ctx.fillStyle=c.owner==="enemy"?"#f55":"#5af";
        ctx.fillRect(x*size+5,y*size+5,size-10,size-10);

        ctx.fillStyle="#000";
        ctx.fillText(c.type,x*size+20,y*size+35);
      }
    }
  }

  document.getElementById("score").textContent=score;
  document.getElementById("combo").textContent=combo;
  document.getElementById("time").textContent=time;
}

function gameLoop(){
  applyGravity();
  checkLines();
  draw();
}

function gameOver(){
  alert("GAME OVER\nScore:"+score);
  location.reload();
}

canvas.addEventListener("click",(e)=>{
  let rect=canvas.getBoundingClientRect();
  let x=Math.floor((e.clientX-rect.left)/size);

  for(let y=ROWS-1;y>=0;y--){
    if(!board[y][x]){
      board[y][x]={type:"歩",owner:"player",state:"fixed",promoted:false};
      break;
    }
  }
});

setInterval(()=>{
  spawnEnemy();
},3000);

setInterval(()=>{
  gameLoop();
},500);

setInterval(()=>{
  time--;
  if(time<=0) gameOver();
},1000);

initQueue();
draw();
</script>

</body>
</html>
