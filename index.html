<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>将棋テトリス：昇天</title>
  <style>
    /* 画面全体にぴったり収めるための設定 */
    html, body {
      margin: 0; padding: 0;
      height: 100%; height: 100dvh; /* iOS Safari対策の動的ビューポート */
      overflow: hidden;
      background-color: #333; color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: flex; flex-direction: column; align-items: center;
    }
    #ui-header {
      width: 100%; max-width: 400px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px; box-sizing: border-box; background: #222;
      flex-shrink: 0; /* ヘッダーが潰れるのを防ぐ */
    }
    .panel {
      background: #444; border-radius: 8px; padding: 5px 10px;
      text-align: center; width: 60px; height: 60px;
      display: flex; flex-direction: column; justify-content: center;
      border: 2px solid #555;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none; /* iOS Safariのテキスト選択防止 */
    }
    .panel span { font-size: 10px; color: #aaa; pointer-events: none; }
    .panel div { font-size: 24px; font-weight: bold; margin-top: 5px; color: #ffe6b3; pointer-events: none;}
    #hold-btn { background: #5a4a3a; border-color: #d3a052; }
    #next-btn { background: #3a4a5a; border-color: #52a0d3; }
    #score-display { font-size: 20px; font-weight: bold; color: #4caf50; }
    
    #canvas-container {
      flex-grow: 1;
      display: flex;
      justify-content: center;
      align-items: center; /* キャンバスを中央に配置 */
      width: 100%;
    }
    canvas {
      background-color: #E2C275;
      box-shadow: 0 0 10px rgba(0,0,0,0.8);
      touch-action: none;
    }
    #message-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 32px; font-weight: bold; color: #ffeb3b;
      text-shadow: 2px 2px 4px #000; display: none; text-align: center; pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="ui-header">
    <div id="hold-btn" class="panel"><span>HOLD</span><div id="hold-piece"></div></div>
    <div id="score-display">0 LINES</div>
    <div id="next-btn" class="panel"><span>NEXT</span><div id="next-piece">歩</div></div>
  </div>

  <div id="canvas-container">
    <canvas id="gameCanvas"></canvas>
  </div>
  <div id="message-overlay"></div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score-display');
    const nextEl = document.getElementById('next-piece');
    const holdEl = document.getElementById('hold-piece');
    const holdBtn = document.getElementById('hold-btn');
    const nextBtn = document.getElementById('next-btn');
    const messageEl = document.getElementById('message-overlay');

    const COLS = 5;
    const ROWS = 9;
    let cellSize = 1;

    const PIECE_TYPES = ['歩', '歩', '歩', '香', '桂'];
    let board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
    let nextPiece = getRandomPiece();
    let holdPiece = null;
    let canHold = true;
    let linesCleared = 0;
    let gameState = 'playing';
    let fallInterval;
    
    let selectedCell = null;
    let validMoves = [];

    // --- 画面サイズに合わせて盤面をピッタリ収める処理 ---
    function resize() {
      const header = document.getElementById('ui-header');
      const container = document.getElementById('canvas-container');
      
      // ヘッダーを除いた「使える画面の高さ」と「幅」を取得
      const availableHeight = container.clientHeight - 10; // 少し余白を持たせる
      const availableWidth = Math.min(window.innerWidth, 400);

      // 横幅基準と縦幅基準、どちらでも画面からはみ出さないセルサイズを計算
      const cellSizeW = Math.floor(availableWidth / COLS);
      const cellSizeH = Math.floor(availableHeight / ROWS);
      
      // 小さい方を採用することで絶対にはみ出さない
      cellSize = Math.min(cellSizeW, cellSizeH);

      canvas.width = cellSize * COLS;
      canvas.height = cellSize * ROWS;
      
      if(gameState === 'playing') draw(); // リサイズ時に再描画
    }
    window.addEventListener('resize', resize);

    function getRandomPiece() {
      return PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
    }

    function initBoard() {
      for (let y = 0; y < 4; y++) {
        for (let x = 0; x < COLS; x++) {
          if (Math.random() < 0.4) {
            board[y][x] = { type: 'block', owner: 'enemy', promoted: false };
          }
        }
      }
      board[1][Math.floor(Math.random()*COLS)] = { type: '王', owner: 'enemy', promoted: false };
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'rgba(211, 47, 47, 0.15)';
      ctx.fillRect(0, 0, canvas.width, cellSize * 3);
      ctx.beginPath();
      ctx.moveTo(0, cellSize * 3);
      ctx.lineTo(canvas.width, cellSize * 3);
      ctx.strokeStyle = 'rgba(211, 47, 47, 0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.strokeStyle = 'rgba(0,0,0,0.1)';
      ctx.lineWidth = 1;
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * cellSize); ctx.lineTo(canvas.width, y * cellSize); ctx.stroke();
      }
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * cellSize, 0); ctx.lineTo(x * cellSize, canvas.height); ctx.stroke();
      }

      if (selectedCell === 'next') {
        ctx.fillStyle = 'rgba(76, 175, 80, 0.4)';
        ctx.fillRect(0, cellSize * (ROWS - 1), canvas.width, cellSize);
      }

      ctx.fillStyle = 'rgba(33, 150, 243, 0.5)';
      validMoves.forEach(m => {
        ctx.fillRect(m.x * cellSize, m.y * cellSize, cellSize, cellSize);
      });

      if (selectedCell && selectedCell !== 'next') {
        ctx.fillStyle = 'rgba(255, 235, 59, 0.6)';
        ctx.fillRect(selectedCell.x * cellSize, selectedCell.y * cellSize, cellSize, cellSize);
      }

      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const p = board[y][x];
          if (p) {
            const px = x * cellSize + cellSize / 2;
            const py = y * cellSize + cellSize / 2;
            
            ctx.beginPath();
            if (p.owner === 'player') {
              ctx.moveTo(px, py - cellSize*0.4);
              ctx.lineTo(px + cellSize*0.35, py - cellSize*0.1);
              ctx.lineTo(px + cellSize*0.3, py + cellSize*0.4);
              ctx.lineTo(px - cellSize*0.3, py + cellSize*0.4);
              ctx.lineTo(px - cellSize*0.35, py - cellSize*0.1);
            } else {
              ctx.rect(px - cellSize*0.4, py - cellSize*0.4, cellSize*0.8, cellSize*0.8);
            }
            ctx.closePath();
            
            if (p.type === 'block') ctx.fillStyle = '#666';
            else if (p.type === '王') ctx.fillStyle = '#444';
            else ctx.fillStyle = p.promoted ? '#ffdd99' : '#ffe6b3';
            ctx.fill();
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2;
            ctx.stroke();

            let text = p.type;
            if (p.promoted && p.owner === 'player') text = '成';
            if (p.type === 'block') text = '';
            
            ctx.fillStyle = (p.promoted || p.type === '王') ? '#d32f2f' : '#000';
            ctx.font = `bold ${cellSize * 0.4}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, px, py);
          }
        }
      }
    }

    function getValidMoves(x, y) {
      const p = board[y][x];
      let moves = [];
      if (!p || p.owner !== 'player') return moves;

      if (p.promoted) {
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            let nx = x + dx, ny = y + dy;
            if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !board[ny][nx]) {
              moves.push({x: nx, y: ny});
            }
          }
        }
        return moves;
      }

      if (p.type === '歩') {
        if (y - 1 >= 0 && !board[y - 1][x]) moves.push({x: x, y: y - 1});
      } else if (p.type === '香') {
        for (let ny = y - 1; ny >= 0; ny--) {
          if (!board[ny][x]) moves.push({x: x, y: ny});
          else break;
        }
      } else if (p.type === '桂') {
        if (y - 2 >= 0) {
          if (x - 1 >= 0 && !board[y - 2][x - 1]) moves.push({x: x - 1, y: y - 2});
          if (x + 1 < COLS && !board[y - 2][x + 1]) moves.push({x: x + 1, y: y - 2});
        }
      }
      return moves;
    }

    function checkLines() {
      let clearedAny = false;
      let hasKing = false;

      for (let y = ROWS - 1; y >= 0; y--) {
        let isFull = true;
        let rowHasKing = false;
        for (let x = 0; x < COLS; x++) {
          if (!board[y][x]) { isFull = false; break; }
          if (board[y][x].type === '王') rowHasKing = true;
        }

        if (isFull) {
          clearedAny = true;
          linesCleared++;
          if (rowHasKing) hasKing = true;

          for (let shiftY = y; shiftY > 0; shiftY--) {
            for (let x = 0; x < COLS; x++) board[shiftY][x] = board[shiftY - 1][x];
          }
          for (let x = 0; x < COLS; x++) board[0][x] = null;
          y++;
        }
      }

      if (clearedAny) {
        scoreEl.textContent = `${linesCleared} LINES`;
        if (hasKing) {
          showMessage("王将撃破！全消しボーナス！");
          for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
              if (board[y][x] && board[y][x].owner === 'enemy') board[y][x] = null;
            }
          }
          setTimeout(checkLines, 300);
        }
        draw();
      }
    }

    function showMessage(msg) {
      messageEl.textContent = msg;
      messageEl.style.display = 'block';
      setTimeout(() => { messageEl.style.display = 'none'; }, 2000);
    }

    function endTurn() {
      checkLines();
      selectedCell = null;
      validMoves = [];
      canHold = true;
      draw();
    }

    nextBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (gameState !== 'playing') return;
      selectedCell = 'next';
      validMoves = [];
      draw();
    });

    holdBtn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (gameState !== 'playing' || !canHold) return;
      if (holdPiece === null) {
        holdPiece = nextPiece;
        nextPiece = getRandomPiece();
      } else {
        const temp = nextPiece;
        nextPiece = holdPiece;
        holdPiece = temp;
      }
      nextEl.textContent = nextPiece;
      holdEl.textContent = holdPiece;
      canHold = false;
      selectedCell = null;
      draw();
    });

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (gameState !== 'playing') return;
      
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / cellSize);
      const y = Math.floor((e.clientY - rect.top) / cellSize);

      if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return;

      if (selectedCell === 'next') {
        if (!board[ROWS - 1][x]) {
          board[ROWS - 1][x] = { type: nextPiece, owner: 'player', promoted: false };
          nextPiece = getRandomPiece();
          nextEl.textContent = nextPiece;
          endTurn();
        } else {
          selectedCell = null;
          draw();
        }
        return;
      }

      const move = validMoves.find(m => m.x === x && m.y === y);
      if (move && selectedCell) {
        const p = board[selectedCell.y][selectedCell.x];
        board[y][x] = p;
        board[selectedCell.y][selectedCell.x] = null;
        if (y <= 2) p.promoted = true;
        endTurn();
        return;
      }

      if (board[y][x] && board[y][x].owner === 'player') {
        selectedCell = { x, y };
        validMoves = getValidMoves(x, y);
        draw();
      } else {
        selectedCell = null;
        validMoves = [];
        draw();
      }
    });

    function pushDown() {
      if (gameState !== 'playing') return;
      for (let x = 0; x < COLS; x++) {
        if (board[ROWS - 1][x] && board[ROWS - 1][x].owner === 'enemy') {
          gameState = 'gameover';
          showMessage("GAME OVER");
          clearInterval(fallInterval);
          return;
        }
      }
      for (let y = ROWS - 1; y > 0; y--) {
        for (let x = 0; x < COLS; x++) board[y][x] = board[y - 1][x];
      }
      for (let x = 0; x < COLS; x++) {
        if (Math.random() < 0.6) {
          const isKing = Math.random() < 0.1;
          board[0][x] = { type: isKing ? '王' : 'block', owner: 'enemy', promoted: false };
        } else {
          board[0][x] = null;
        }
      }
      checkLines();
      draw();
    }

    // 初期化と起動
    // フォント等の読み込み待ちを防ぐため、少しだけ遅らせてリサイズと描画を実行
    setTimeout(() => {
      resize();
      initBoard();
      draw();
      fallInterval = setInterval(pushDown, 12000);
    }, 100);

  </script>
</body>
</html>
