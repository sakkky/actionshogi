<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ひっぱり将棋バトル - 突破編</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #E2C275;
      font-family: sans-serif;
    }
    canvas {
      display: block;
      touch-action: none;
    }
    #ui-container {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      color: #333;
      pointer-events: none;
    }
    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      font-weight: bold;
      color: #d32f2f;
      text-shadow: 2px 2px 0 #fff;
      display: none;
      text-align: center;
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="ui-container">
    <div id="turn-display">残り手数: 5</div>
    <div id="hp-display">王のHP: 100</div>
  </div>
  <div id="message"></div>
  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const turnDisplay = document.getElementById('turn-display');
    const hpDisplay = document.getElementById('hp-display');
    const messageEl = document.getElementById('message');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let gameState = 'playing';
    let turns = 5;
    let enemyHp = 100;

    class Piece {
      constructor(x, y, radius, text, type) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.radius = radius;
        this.text = text;
        this.type = type; // 'player', 'king', 'wall'
        this.isPromoted = false;
        this.active = true; // 破壊されたかどうか
      }

      draw() {
        if (!this.active) return;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        
        if (this.type === 'king') ctx.fillStyle = '#ffb3b3';
        else if (this.type === 'wall') ctx.fillStyle = '#cccccc';
        else ctx.fillStyle = this.isPromoted ? '#ffdd99' : '#ffe6b3';
        
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = (this.isPromoted || this.type === 'king') ? '#d32f2f' : '#000';
        ctx.font = `bold ${this.radius * 0.8}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.text, this.x, this.y);

        // 王のHPバー
        if (this.type === 'king') {
          ctx.fillStyle = '#333';
          ctx.fillRect(this.x - 30, this.y - this.radius - 20, 60, 8);
          ctx.fillStyle = '#4caf50';
          const hpWidth = Math.max(0, (enemyHp / 100) * 60);
          ctx.fillRect(this.x - 30, this.y - this.radius - 20, hpWidth, 8);
        }
      }

      update() {
        if (!this.active || this.type === 'wall' || this.type === 'king') return; // 敵は動かない

        this.vx *= 0.98;
        this.vy *= 0.98;

        if (Math.abs(this.vx) < 0.2) this.vx = 0;
        if (Math.abs(this.vy) < 0.2) this.vy = 0;

        this.x += this.vx;
        this.y += this.vy;

        // 壁のバウンド
        if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -0.8; }
        if (this.x + this.radius > canvas.width) { this.x = canvas.width - this.radius; this.vx *= -0.8; }
        if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -0.8; }
        if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy *= -0.8; }

        // 成り判定
        const promotionZone = canvas.height * 0.3;
        if (this.type === 'player' && !this.isPromoted && this.y < promotionZone) {
          this.isPromoted = true;
          this.text = 'と';
          this.radius += 10;
        }
      }
    }

    // 初期配置
    let player = new Piece(canvas.width / 2, canvas.height * 0.85, 25, '歩', 'player');
    let enemies = [
      new Piece(canvas.width / 2, canvas.height * 0.15, 45, '王', 'king')
    ];
    
    // 王を守る3つの壁（敵の歩）
    const wallY = canvas.height * 0.35;
    enemies.push(new Piece(canvas.width / 2, wallY, 25, '歩', 'wall'));
    enemies.push(new Piece(canvas.width / 2 - 70, wallY, 25, '歩', 'wall'));
    enemies.push(new Piece(canvas.width / 2 + 70, wallY, 25, '歩', 'wall'));

    let isDragging = false;
    let currentX = 0;
    let currentY = 0;

    canvas.addEventListener('pointerdown', (e) => {
      if (gameState !== 'playing') return;
      const dx = e.clientX - player.x;
      const dy = e.clientY - player.y;
      if (Math.hypot(dx, dy) < player.radius && player.vx === 0 && player.vy === 0) {
        isDragging = true;
        currentX = e.clientX;
        currentY = e.clientY;
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      currentX = e.clientX;
      currentY = e.clientY;
    });

    canvas.addEventListener('pointerup', (e) => {
      if (!isDragging) return;
      isDragging = false;
      
      const dx = player.x - currentX;
      const dy = player.y - currentY;
      player.vx = dx * 0.18; // 少しスピードアップ
      player.vy = dy * 0.18;

      turns--;
      turnDisplay.textContent = `残り手数: ${turns}`;
    });

    function checkCollisions() {
      enemies.forEach(enemy => {
        if (!enemy.active) return;

        const dx = enemy.x - player.x;
        const dy = enemy.y - player.y;
        const distance = Math.hypot(dx, dy);
        const minDist = player.radius + enemy.radius;

        if (distance < minDist) {
          // 衝突処理
          const speed = Math.hypot(player.vx, player.vy);

          if (enemy.type === 'wall') {
            enemy.active = false; // 壁を破壊
            if (!player.isPromoted) {
              // 「歩」の時は壁に当たると勢いが死ぬ（貫通できない）
              player.vx = 0;
              player.vy = 0;
            }
            // 「と金」の時は減速しつつ貫通する
            else {
              player.vx *= 0.8;
              player.vy *= 0.8;
            }
          } 
          else if (enemy.type === 'king') {
            // 王へのダメージ
            const damage = player.isPromoted ? 40 : 15; // と金なら大ダメージ
            if (speed > 2) { // ある程度スピードがないとダメージにならない
              enemyHp -= damage;
              if (enemyHp < 0) enemyHp = 0;
              hpDisplay.textContent = `王のHP: ${enemyHp}`;
              
              // 王に当たったら跳ね返る
              const nx = dx / distance;
              const ny = dy / distance;
              player.vx = -nx * speed * 0.5;
              player.vy = -ny * speed * 0.5;
            }
          }

          // 重なりを解消
          const overlap = minDist - distance;
          player.x -= (dx / distance) * overlap;
        }
      });
    }

    function checkGameState() {
      if (gameState !== 'playing') return;

      if (enemyHp <= 0) {
        gameState = 'clear';
        messageEl.innerHTML = '見事！<br>王将討ち取ったり！';
        messageEl.style.display = 'block';
        messageEl.style.color = '#4caf50';
      } 
      else if (turns <= 0 && player.vx === 0 && player.vy === 0) {
        gameState = 'gameover';
        messageEl.innerHTML = '無念...<br>手数が尽きました';
        messageEl.style.display = 'block';
      }
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 敵陣（成りゾーン）
      ctx.fillStyle = 'rgba(211, 47, 47, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height * 0.3);
      ctx.beginPath();
      ctx.moveTo(0, canvas.height * 0.3);
      ctx.lineTo(canvas.width, canvas.height * 0.3);
      ctx.strokeStyle = 'rgba(211, 47, 47, 0.5)';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      ctx.stroke();
      ctx.setLineDash([]);

      if (isDragging) {
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(currentX, currentY);
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.lineWidth = 4;
        ctx.stroke();
      }

      player.update();
      enemies.forEach(e => e.update());
      checkCollisions();
      
      enemies.forEach(e => e.draw());
      player.draw(); // プレイヤーを一番手前に描画
      
      checkGameState();

      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
