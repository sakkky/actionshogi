<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>将棋テトリス：昇天 v2.0</title>
  <style>
    html, body {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      margin: 0; padding: 0;
      padding-bottom: calc(env(safe-area-inset-bottom) + 10px); 
      background-color: #111; color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      touch-action: none; overscroll-behavior: none;
      -webkit-text-size-adjust: 100%; user-select: none; -webkit-user-select: none;
    }
    #ui-header {
      width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center;
      padding: 10px; box-sizing: border-box; background: #222; flex-shrink: 0; border-bottom: 2px solid #444;
    }
    .panel {
      background: #333; border-radius: 6px; padding: 5px; text-align: center; width: 60px; height: 60px;
      display: flex; flex-direction: column; justify-content: center; border: 2px solid #555; cursor: pointer;
    }
    .panel span { font-size: 10px; color: #aaa; pointer-events: none; }
    .panel div { font-size: 20px; font-weight: bold; margin-top: 4px; color: #ffe6b3; pointer-events: none; display: flex; justify-content: space-around;}
    
    .center-info { display: flex; flex-direction: column; align-items: center; width: 120px; }
    #score-display { font-size: 22px; font-weight: bold; color: #4caf50; }
    #time-display { font-size: 16px; font-weight: bold; color: #ffeb3b; margin-top: 2px; }
    #combo-display { font-size: 14px; font-weight: bold; color: #ff9800; margin-top: 2px; opacity: 0; transition: opacity 0.2s;}
    
    #canvas-container {
      flex-grow: 1; display: flex; justify-content: center; align-items: center; 
      width: 100%; padding: 10px; box-sizing: border-box; position: relative;
    }
    canvas { background-color: #E2C275; box-shadow: 0 0 15px rgba(0,0,0,0.8); border-radius: 4px; }
    
    #overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 100; text-align: center;
    }
    #overlay h1 { color: #ffeb3b; margin-bottom: 10px; font-size: 32px;}
    #overlay p { font-size: 20px; margin: 5px 0; }
    #start-btn {
      margin-top: 30px; padding: 15px 40px; font-size: 20px; font-weight: bold;
      background: #4caf50; color: #fff; border: none; border-radius: 8px; cursor: pointer;
    }
    #danger-overlay {
      position: absolute; top:0; left:0; right:0; height: 30%;
      background: linear-gradient(to bottom, rgba(255,0,0,0.3) 0%, rgba(255,0,0,0) 100%);
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
  </style>
</head>
<body>

  <div id="ui-header">
    <div id="next-my-btn" class="panel"><span>MY NEXT</span><div id="my-next">歩</div></div>
    <div class="center-info">
      <div id="score-display">0</div>
      <div id="time-display">03:00</div>
      <div id="combo-display">2 COMBO!</div>
    </div>
    <div class="panel"><span>ENEMY NEXT</span><div id="enemy-next"></div></div>
  </div>

  <div id="canvas-container">
    <div id="danger-overlay"></div>
    <canvas id="gameCanvas"></canvas>
  </div>

  <div id="overlay">
    <h1 id="result-title">将棋テトリス：昇天</h1>
    <div id="result-details" style="display:none;">
      <p id="res-score">Score: 0</p>
      <p id="res-combo">Max Combo: 0</p>
      <p id="res-rank" style="font-size: 40px; color: #ff9800; margin-top: 10px;">Rank: C</p>
    </div>
    <button id="start-btn">GAME START</button>
  </div>

  <script>
    // --- ズーム防止 ---
    document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
    document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

    // --- Audio System (簡易シンセ) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let actx = null;
    function playSound(type, combo = 1) {
      if(!actx) return;
      const osc = actx.createOscillator();
      const gain = actx.createGain();
      osc.connect(gain);
      gain.connect(actx.destination);
      const now = actx.currentTime;

      if(type === 'move') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(440, now);
        gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
      } else if (type === 'clear') {
        osc.type = 'square'; osc.frequency.setValueAtTime(200 + combo * 50, now); // コンボでピッチ上昇
        gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now); osc.stop(now + 0.2);
      } else if (type === 'king') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.5);
        gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
      } else if (type === 'danger') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, now);
        gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
      }
    }

    // --- ゲーム設定 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const COLS = 5; const ROWS = 9;
    let cellSize = 1;

    // --- 状態管理 ---
    let gameState = { status: "title", score: 0, combo: 0, timeLeft: 180, maxCombo: 0 };
    let board = [];
    let spawnQueue = []; // 敵NEXT
    let myNextPiece = '歩'; // 自分のNEXT
    const PIECE_TYPES = ['歩', '歩', '歩', '香', '桂'];
    const ENEMY_TYPES = ['歩', '歩', '香', '桂', '王'];
    
    let selectedCell = null;
    let validMoves = [];
    let loopId, gravityTimerId, secondTimerId;

    // UI Elements
    const uiScore = document.getElementById('score-display');
    const uiTime = document.getElementById('time-display');
    const uiCombo = document.getElementById('combo-display');
    const uiEnemyNext = document.getElementById('enemy-next');
    const uiMyNext = document.getElementById('my-next');
    const dangerOverlay = document.getElementById('danger-overlay');
    const overlay = document.getElementById('overlay');

    function resize() {
      const header = document.getElementById('ui-header');
      const safeBottom = parseInt(getComputedStyle(document.body).paddingBottom) || 20;
      const availableHeight = window.innerHeight - header.offsetHeight - safeBottom - 20;
      const availableWidth = Math.min(window.innerWidth, 400) - 20;
      cellSize = Math.min(Math.floor(availableWidth / COLS), Math.floor(availableHeight / ROWS));
      canvas.width = cellSize * COLS; canvas.height = cellSize * ROWS;
      draw();
    }
    window.addEventListener('resize', () => { setTimeout(resize, 100); });

    function initGame() {
      if(!actx) actx = new AudioContext();
      gameState = { status: "playing", score: 0, combo: 0, timeLeft: 180, maxCombo: 0 };
      board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
      spawnQueue = [getRandPiece(ENEMY_TYPES), getRandPiece(ENEMY_TYPES)];
      myNextPiece = getRandPiece(PIECE_TYPES);
      selectedCell = null; validMoves = [];
      updateUI();
      
      if(loopId) cancelAnimationFrame(loopId);
      if(gravityTimerId) clearInterval(gravityTimerId);
      if(secondTimerId) clearInterval(secondTimerId);
      
      gravityTimerId = setInterval(applyGravity, 1000);
      secondTimerId = setInterval(tickTime, 1000);
      loop();
      overlay.style.display = 'none';
    }

    function getRandPiece(arr) {
      let r = Math.random();
      if(arr === ENEMY_TYPES) {
        if(r < 0.05) return '王';
        if(r < 0.15) return '桂';
        if(r < 0.25) return '香';
        return '歩';
      }
      return arr[Math.floor(Math.random() * arr.length)];
    }

    // --- コアロジック ---

    // 1秒に1回呼ばれる
    function tickTime() {
      if(gameState.status !== 'playing') return;
      gameState.timeLeft--;
      updateUI();
      
      // 終了判定
      if(gameState.timeLeft <= 0 || checkTopOut()) {
        endGame();
      }
      // 危険演出
      if(checkDanger()) {
        dangerOverlay.style.opacity = '1';
        playSound('danger');
        setTimeout(() => dangerOverlay.style.opacity = '0', 500);
      }
    }

    function checkTopOut() {
      for(let y = 0; y <= 2; y++) {
        for(let x = 0; x < COLS; x++) {
          if(board[y][x] && board[y][x].state === 'fixed') return true;
        }
      }
      return false;
    }
    function checkDanger() {
      for(let x = 0; x < COLS; x++) {
        if(board[3][x] && board[3][x].state === 'fixed') return true;
      }
      return false;
    }

    // 敵の落下
    function applyGravity() {
      if(gameState.status !== 'playing') return;
      let moved = false;
      for(let y = ROWS - 2; y >= 0; y--) {
        for(let x = 0; x < COLS; x++) {
          let p = board[y][x];
          if(p && p.owner === 'enemy' && p.state === 'falling') {
            if(!board[y+1][x]) {
              board[y+1][x] = p; board[y][x] = null; moved = true;
            } else {
              p.state = 'fixed'; moved = true;
            }
          }
        }
      }
      for(let x = 0; x < COLS; x++) {
        let p = board[ROWS-1][x];
        if(p && p.owner === 'enemy' && p.state === 'falling') { p.state = 'fixed'; moved = true; }
      }
      
      // 敵の生成（ランダムな空き列に）
      spawnEnemy();
      if(moved) {
        checkLines(); // 落下によってラインが揃うかもしれない
      }
    }

    function spawnEnemy() {
      let emptyCols = [];
      for(let x=0; x<COLS; x++) { if(!board[0][x]) emptyCols.push(x); }
      if(emptyCols.length > 0) {
        let col = emptyCols[Math.floor(Math.random() * emptyCols.length)];
        let type = spawnQueue.shift();
        spawnQueue.push(getRandPiece(ENEMY_TYPES));
        board[0][col] = { type: type, owner: 'enemy', state: 'falling', promoted: false };
        updateUI();
      }
    }

    function getValidMoves(x, y) {
      let p = board[y][x];
      let moves = [];
      if(!p || p.owner !== 'player') return moves;
      const canMove = (nx, ny) => (nx>=0 && nx<COLS && ny>=0 && ny<ROWS && (!board[ny][nx] || board[ny][nx].owner === 'enemy'));

      if(p.promoted) {
        for(let dy=-1; dy<=1; dy++) for(let dx=-1; dx<=1; dx++) {
          if((dx!==0 || dy!==0) && canMove(x+dx, y+dy)) moves.push({x:x+dx, y:y+dy});
        }
        return moves;
      }
      if(p.type === '歩') { if(canMove(x, y-1)) moves.push({x, y:y-1}); }
      else if(p.type === '香') {
        for(let ny=y-1; ny>=0; ny--) {
          if(canMove(x, ny)) { moves.push({x, y:ny}); if(board[ny][x] && board[ny][x].owner === 'enemy') break; } else break;
        }
      } else if(p.type === '桂') {
        if(canMove(x-1, y-2)) moves.push({x:x-1, y:y-2});
        if(canMove(x+1, y-2)) moves.push({x:x+1, y:y-2});
      }
      return moves;
    }

    // --- 消去・効果ロジック ---
    function checkLines(isChain = false) {
      let linesToClear = [];
      // 下から判定
      for(let y = ROWS - 1; y >= 0; y--) {
        let full = true;
        for(let x = 0; x < COLS; x++) { if(!board[y][x]) { full = false; break; } }
        if(full) linesToClear.push(y);
      }

      if(linesToClear.length === 0) {
        if(!isChain) gameState.combo = 0; // 連鎖終了でコンボリセット
        updateUI();
        return;
      }

      // 消去処理
      gameState.combo++;
      if(gameState.combo > gameState.maxCombo) gameState.maxCombo = gameState.combo;
      playSound('clear', gameState.combo);
      
      let baseScore = linesToClear.length === 1 ? 100 : linesToClear.length === 2 ? 300 : 600;
      let multiplier = gameState.combo === 1 ? 1.0 : gameState.combo === 2 ? 1.5 : 2.0;
      gameState.score += Math.floor(baseScore * multiplier);

      // 効果の収集と駒の削除
      let effects = { kyo: [], kei: [], ou: false };
      
      linesToClear.forEach(y => {
        for(let x = 0; x < COLS; x++) {
          let p = board[y][x];
          if(p) {
            if(p.type === '香') effects.kyo.push(x);
            if(p.type === '桂') effects.kei.push({x, y});
            if(p.type === '王') effects.ou = true;
          }
          board[y][x] = null; // 消去
        }
      });

      // 上のブロックを詰める（テトリス挙動：消えた行の上にだけ影響）
      // 簡易化のため、下から空行を探して詰める
      for (let x = 0; x < COLS; x++) {
        let writeY = ROWS - 1;
        for (let readY = ROWS - 1; readY >= 0; readY--) {
          if (board[readY][x] !== null) {
            board[writeY][x] = board[readY][x];
            writeY--;
          }
        }
        for (; writeY >= 0; writeY--) board[writeY][x] = null;
      }

      // 追加効果の適用
      applyLineEffect(effects);
    }

    function applyLineEffect(effects) {
      let effectTriggered = false;
      
      if(effects.ou) {
        playSound('king');
        gameState.score += 1000;
        for(let y=0; y<ROWS; y++) for(let x=0; x<COLS; x++) {
          if(board[y][x] && board[y][x].owner === 'enemy') board[y][x] = null;
        }
        effectTriggered = true;
      } else {
        // 香：縦全消し
        effects.kyo.forEach(col => {
          for(let y=0; y<ROWS; y++) {
             if(board[y][col] && board[y][col].owner === 'enemy') { board[y][col] = null; effectTriggered = true; }
          }
        });
        // 桂：周囲8マス
        effects.kei.forEach(pos => {
          for(let dy=-1; dy<=1; dy++) for(let dx=-1; dx<=1; dx++) {
            let nx = pos.x+dx, ny = pos.y+dy;
            if(nx>=0 && nx<COLS && ny>=0 && ny<ROWS) {
              if(board[ny][nx] && board[ny][nx].owner === 'enemy') { board[ny][nx] = null; effectTriggered = true; }
            }
          }
        });
      }

      // 効果で消えた場合、さらにブロックが落ちて連鎖するかもしれない
      if(effectTriggered) {
        // 再度重力を適用して落とす
        for (let x = 0; x < COLS; x++) {
          let writeY = ROWS - 1;
          for (let readY = ROWS - 1; readY >= 0; readY--) {
            if (board[readY][x] !== null) {
              board[writeY][x] = board[readY][x];
              writeY--;
            }
          }
          for (; writeY >= 0; writeY--) board[writeY][x] = null;
        }
      }
      
      updateUI();
      
      // 落ちコン判定
      setTimeout(() => checkLines(true), 200); 
    }

    // --- 入力処理 ---
    document.getElementById('next-my-btn').addEventListener('pointerdown', (e) => {
      e.preventDefault(); if(gameState.status !== 'playing') return;
      selectedCell = 'next'; validMoves = []; draw();
    });

    canvas.addEventListener('pointerdown', (e) => {
      e.preventDefault(); if(gameState.status !== 'playing') return;
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / cellSize);
      const y = Math.floor((e.clientY - rect.top) / cellSize);
      if(x < 0 || x >= COLS || y < 0 || y >= ROWS) return;

      // NEXT配置
      if(selectedCell === 'next') {
        if(!board[ROWS-1][x]) {
          board[ROWS-1][x] = { type: myNextPiece, owner: 'player', state: 'fixed', promoted: false };
          myNextPiece = getRandPiece(PIECE_TYPES);
          playSound('move');
          selectedCell = null;
          checkLines(false); // アクション後にチェック
        } else { selectedCell = null; draw(); }
        return;
      }

      // 移動実行
      const move = validMoves.find(m => m.x === x && m.y === y);
      if(move && selectedCell) {
        let p = board[selectedCell.y][selectedCell.x];
        board[y][x] = p;
        board[selectedCell.y][selectedCell.x] = null;
        if(y <= 2) p.promoted = true;
        playSound('move');
        selectedCell = null; validMoves = [];
        checkLines(false);
        return;
      }

      // 駒選択
      if(board[y][x] && board[y][x].owner === 'player') {
        selectedCell = {x, y}; validMoves = getValidMoves(x, y); draw();
      } else {
        selectedCell = null; validMoves = []; draw();
      }
    });

    // --- UIと描画 ---
    function updateUI() {
      uiScore.textContent = gameState.score;
      let m = Math.floor(gameState.timeLeft / 60);
      let s = gameState.timeLeft % 60;
      uiTime.textContent = `0${m}:${s<10?'0':''}${s}`;
      
      uiEnemyNext.innerHTML = spawnQueue.map(p => `<span style="color:#dcdcdc">${p}</span>`).join(' ');
      uiMyNext.textContent = myNextPiece;

      if(gameState.combo >= 2) {
        uiCombo.textContent = `${gameState.combo} COMBO!`;
        uiCombo.style.opacity = '1';
      } else {
        uiCombo.style.opacity = '0';
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // ゾーン背景
      ctx.fillStyle = 'rgba(211, 47, 47, 0.15)'; ctx.fillRect(0, 0, canvas.width, cellSize * 3);
      ctx.beginPath(); ctx.moveTo(0, cellSize * 3); ctx.lineTo(canvas.width, cellSize * 3);
      ctx.strokeStyle = 'rgba(211, 47, 47, 0.5)'; ctx.lineWidth = 2; ctx.stroke();

      ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
      for(let y=0; y<=ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y*cellSize); ctx.lineTo(canvas.width, y*cellSize); ctx.stroke(); }
      for(let x=0; x<=COLS; x++) { ctx.beginPath(); ctx.moveTo(x*cellSize, 0); ctx.lineTo(x*cellSize, canvas.height); ctx.stroke(); }

      if(selectedCell === 'next') {
        ctx.fillStyle = 'rgba(76, 175, 80, 0.3)'; ctx.fillRect(0, cellSize*(ROWS-1), canvas.width, cellSize);
      }
      ctx.fillStyle = 'rgba(33, 150, 243, 0.4)';
      validMoves.forEach(m => {
        if(board[m.y][m.x]) ctx.fillStyle = 'rgba(244, 67, 54, 0.5)';
        ctx.fillRect(m.x*cellSize, m.y*cellSize, cellSize, cellSize);
        ctx.fillStyle = 'rgba(33, 150, 243, 0.4)';
      });
      if(selectedCell && selectedCell !== 'next') {
        ctx.fillStyle = 'rgba(255, 235, 59, 0.5)'; ctx.fillRect(selectedCell.x*cellSize, selectedCell.y*cellSize, cellSize, cellSize);
      }

      for(let y=0; y<ROWS; y++) {
        for(let x=0; x<COLS; x++) {
          let p = board[y][x];
          if(p) {
            let px = x*cellSize + cellSize/2, py = y*cellSize + cellSize/2;
            ctx.save(); ctx.translate(px, py);
            if(p.owner === 'enemy') ctx.rotate(Math.PI);
            
            ctx.beginPath();
            ctx.moveTo(0, -cellSize*0.4); ctx.lineTo(cellSize*0.35, -cellSize*0.1);
            ctx.lineTo(cellSize*0.3, cellSize*0.4); ctx.lineTo(-cellSize*0.3, cellSize*0.4);
            ctx.lineTo(-cellSize*0.35, -cellSize*0.1); ctx.closePath();
            
            ctx.fillStyle = p.type === '王' ? '#ffb3b3' : p.owner === 'enemy' ? '#dcdcdc' : (p.promoted ? '#ffdd99' : '#ffe6b3');
            ctx.fill();
            ctx.strokeStyle = p.state === 'falling' ? '#ff9800' : '#222';
            ctx.lineWidth = p.state === 'falling' ? 3 : 2; ctx.stroke();

            ctx.fillStyle = (p.promoted || p.type === '王') ? '#d32f2f' : '#000';
            ctx.font = `bold ${cellSize*0.4}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(p.promoted && p.owner==='player' ? '成' : p.type, 0, 0);
            ctx.restore();
          }
        }
      }
    }

    function loop() {
      if(gameState.status === 'playing') {
        draw();
        loopId = requestAnimationFrame(loop);
      }
    }

    function endGame() {
      gameState.status = "gameover";
      clearInterval(gravityTimerId); clearInterval(secondTimerId);
      
      let rank = gameState.score >= 10000 ? "S" : gameState.score >= 5000 ? "A" : gameState.score >= 2000 ? "B" : "C";
      document.getElementById('result-title').textContent = "TIME UP!";
      document.getElementById('res-score').textContent = `Score: ${gameState.score}`;
      document.getElementById('res-combo').textContent = `Max Combo: ${gameState.maxCombo}`;
      document.getElementById('res-rank').textContent = `Rank: ${rank}`;
      document.getElementById('result-details').style.display = 'block';
      document.getElementById('start-btn').textContent = "RETRY";
      overlay.style.display = 'flex';
      draw();
    }

    document.getElementById('start-btn').addEventListener('click', initGame);
    resize();
  </script>
</body>
</html>
