<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ひっぱり将棋バトル</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #E2C275;
      font-family: sans-serif;
    }
    canvas {
      display: block;
      touch-action: none;
    }
    #ui-container {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      color: #333;
      pointer-events: none;
    }
    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 32px;
      font-weight: bold;
      color: #d32f2f;
      text-shadow: 2px 2px 0 #fff;
      display: none;
    }
  </style>
</head>
<body>
  <div id="ui-container">
    <div id="turn-display">残り手数: 5</div>
    <div id="hp-display">王のHP: 100</div>
  </div>
  <div id="message"></div>
  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const turnDisplay = document.getElementById('turn-display');
    const hpDisplay = document.getElementById('hp-display');
    const messageEl = document.getElementById('message');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ゲームの状態管理
    let gameState = 'playing'; // playing, clear, gameover
    let turns = 5;
    const enemyMaxHp = 100;
    let enemyHp = enemyMaxHp;

    class Piece {
      constructor(x, y, radius, text, isEnemy) {
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.radius = radius;
        this.text = text;
        this.isEnemy = isEnemy;
        this.mass = isEnemy ? 3 : 1; 
        this.isPromoted = false;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.isEnemy ? '#ffcccc' : (this.isPromoted ? '#ffdd99' : '#ffe6b3');
        ctx.fill();
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = (this.isPromoted || this.isEnemy) ? '#d32f2f' : '#000';
        ctx.font = `bold ${this.radius * 0.8}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.text, this.x, this.y);

        // 王のHPバー描画
        if (this.isEnemy) {
          ctx.fillStyle = '#333';
          ctx.fillRect(this.x - 30, this.y - this.radius - 20, 60, 8);
          ctx.fillStyle = '#4caf50';
          const hpWidth = Math.max(0, (enemyHp / enemyMaxHp) * 60);
          ctx.fillRect(this.x - 30, this.y - this.radius - 20, hpWidth, 8);
        }
      }

      update() {
        this.vx *= 0.97; // 摩擦
        this.vy *= 0.97;

        if (Math.abs(this.vx) < 0.2) this.vx = 0;
        if (Math.abs(this.vy) < 0.2) this.vy = 0;

        this.x += this.vx;
        this.y += this.vy;

        // 壁のバウンド
        if (this.x - this.radius < 0) { this.x = this.radius; this.vx *= -0.8; }
        if (this.x + this.radius > canvas.width) { this.x = canvas.width - this.radius; this.vx *= -0.8; }
        if (this.y - this.radius < 0) { this.y = this.radius; this.vy *= -0.8; }
        if (this.y + this.radius > canvas.height) { this.y = canvas.height - this.radius; this.vy *= -0.8; }

        // 「成り」の判定（画面上部30%に入ったら）
        const promotionZone = canvas.height * 0.3;
        if (!this.isEnemy && !this.isPromoted && this.y < promotionZone) {
          this.isPromoted = true;
          this.text = 'と';
          this.radius += 10; // 大きくなる
          this.mass = 2;     // 重くなる（ダメージアップ）
        }
      }
    }

    let player = new Piece(canvas.width / 2, canvas.height * 0.8, 30, '歩', false);
    let enemy = new Piece(canvas.width / 2, canvas.height * 0.15, 45, '王', true);
    let pieces = [player, enemy];

    let isDragging = false;
    let currentX = 0;
    let currentY = 0;

    canvas.addEventListener('pointerdown', (e) => {
      if (gameState !== 'playing') return;
      const dx = e.clientX - player.x;
      const dy = e.clientY - player.y;
      // 駒が完全に止まっている時だけ引ける
      if (Math.hypot(dx, dy) < player.radius && player.vx === 0 && player.vy === 0) {
        isDragging = true;
        currentX = e.clientX;
        currentY = e.clientY;
      }
    });

    canvas.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      currentX = e.clientX;
      currentY = e.clientY;
    });

    canvas.addEventListener('pointerup', (e) => {
      if (!isDragging) return;
      isDragging = false;
      
      const dx = player.x - currentX;
      const dy = player.y - currentY;
      player.vx = dx * 0.15;
      player.vy = dy * 0.15;

      turns--;
      turnDisplay.textContent = `残り手数: ${turns}`;
    });

    function checkCollisions() {
      const dx = enemy.x - player.x;
      const dy = enemy.y - player.y;
      const distance = Math.hypot(dx, dy);
      const minDist = player.radius + enemy.radius;

      if (distance < minDist) {
        const overlap = minDist - distance;
        const nx = dx / distance;
        const ny = dy / distance;
        
        player.x -= nx * (overlap / 2);
        enemy.x += nx * (overlap / 2);

        const relativeVelocityX = player.vx - enemy.vx;
        const relativeVelocityY = player.vy - enemy.vy;
        const speed = relativeVelocityX * nx + relativeVelocityY * ny;

        if (speed > 0) {
          const restitution = 0.8;
          const impulse = (2 * speed) / (player.mass + enemy.mass);
          
          player.vx -= impulse * enemy.mass * nx * restitution;
          player.vy -= impulse * enemy.mass * ny * restitution;
          enemy.vx += impulse * player.mass * nx * restitution;
          enemy.vy += impulse * player.mass * ny * restitution;

          // ダメージ計算（衝撃の強さ × 自駒の重さ）
          const damage = Math.floor(speed * player.mass * 1.5);
          if (damage > 0) {
            enemyHp -= damage;
            if (enemyHp < 0) enemyHp = 0;
            hpDisplay.textContent = `王のHP: ${enemyHp}`;
          }
        }
      }
    }

    function checkGameState() {
      if (gameState !== 'playing') return;

      // 敵を倒したか
      if (enemyHp <= 0) {
        gameState = 'clear';
        messageEl.textContent = 'クリア！王将討ち取ったり！';
        messageEl.style.display = 'block';
        messageEl.style.color = '#4caf50';
      } 
      // ターン切れで、かつ両方の駒が止まったか
      else if (turns <= 0 && player.vx === 0 && player.vy === 0 && enemy.vx === 0 && enemy.vy === 0) {
        gameState = 'gameover';
        messageEl.textContent = 'ゲームオーバー...';
        messageEl.style.display = 'block';
      }
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 敵陣（成りゾーン）の背景を描画
      ctx.fillStyle = 'rgba(211, 47, 47, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height * 0.3);
      ctx.beginPath();
      ctx.moveTo(0, canvas.height * 0.3);
      ctx.lineTo(canvas.width, canvas.height * 0.3);
      ctx.strokeStyle = 'rgba(211, 47, 47, 0.5)';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      ctx.stroke();
      ctx.setLineDash([]);

      if (isDragging) {
        ctx.beginPath();
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(currentX, currentY);
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
        ctx.lineWidth = 4;
        ctx.stroke();
      }

      pieces.forEach(p => p.update());
      checkCollisions();
      pieces.forEach(p => p.draw());
      checkGameState();

      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
