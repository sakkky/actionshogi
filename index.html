<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>将棋テトリス：昇天</title>
  <style>
    body {
      margin: 0; padding: 0; overflow: hidden;
      background-color: #333; color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: flex; flex-direction: column; align-items: center;
    }
    #ui-header {
      width: 100%; max-width: 400px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px; box-sizing: border-box; background: #222;
    }
    .panel {
      background: #444; border-radius: 8px; padding: 5px 10px;
      text-align: center; width: 60px; height: 60px;
      display: flex; flex-direction: column; justify-content: center;
      border: 2px solid #555;
    }
    .panel span { font-size: 10px; color: #aaa; }
    .panel div { font-size: 24px; font-weight: bold; margin-top: 5px; color: #ffe6b3;}
    #hold-btn { cursor: pointer; background: #5a4a3a; border-color: #d3a052; }
    #score-display { font-size: 20px; font-weight: bold; color: #4caf50; }
    canvas {
      background-color: #E2C275;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      touch-action: none;
    }
    #message-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 32px; font-weight: bold; color: #ffeb3b;
      text-shadow: 2px 2px 4px #000; display: none; text-align: center; pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="ui-header">
    <div id="hold-btn" class="panel"><span>HOLD</span><div id="hold-piece"></div></div>
    <div id="score-display">0 LINES</div>
    <div class="panel"><span>NEXT</span><div id="next-piece">歩</div></div>
  </div>

  <canvas id="gameCanvas"></canvas>
  <div id="message-overlay"></div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score-display');
    const nextEl = document.getElementById('next-piece');
    const holdEl = document.getElementById('hold-piece');
    const holdBtn = document.getElementById('hold-btn');
    const messageEl = document.getElementById('message-overlay');

    const COLS = 5;
    const ROWS = 9;
    let cellSize = 1;
    let boardOffsetX = 0;
    let boardOffsetY = 0;

    // ゲームの定数・状態
    const PIECE_TYPES = ['歩', '歩', '歩', '香', '桂']; // 出現確率調整
    let board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
    let nextPiece = getRandomPiece();
    let holdPiece = null;
    let canHold = true;
    let linesCleared = 0;
    let gameState = 'playing'; // playing, gameover
    let fallInterval;
    
    // 操作状態
    let selectedCell = null; // {x, y} または 'next'
    let validMoves = [];

    // 画面リサイズ調整
    function resize() {
      const maxWidth = 400;
      const maxHeight = window.innerHeight - 100;
      const w = Math.min(window.innerWidth, maxWidth);
      cellSize = Math.floor(w / COLS);
      const h = cellSize * ROWS;
      
      canvas.width = cellSize * COLS;
      canvas.height = h;
    }
    window.addEventListener('resize', resize);
    resize();

    // ユーティリティ
    function getRandomPiece() {
      return PIECE_TYPES[Math.floor(Math.random() * PIECE_TYPES.length)];
    }

    // 初期盤面生成（奥にブロックを配置）
    function initBoard() {
      for (let y = 0; y < 4; y++) {
        for (let x = 0; x < COLS; x++) {
          if (Math.random() < 0.4) {
            board[y][x] = { type: 'block', owner: 'enemy', promoted: false };
          }
        }
      }
      // 王将を1つ配置
      board[1][Math.floor(Math.random()*COLS)] = { type: '王', owner: 'enemy', promoted: false };
    }

    // 描画
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 成りゾーン（上3段）の背景
      ctx.fillStyle = 'rgba(211, 47, 47, 0.15)';
      ctx.fillRect(0, 0, canvas.width, cellSize * 3);
      ctx.beginPath();
      ctx.moveTo(0, cellSize * 3);
      ctx.lineTo(canvas.width, cellSize * 3);
      ctx.strokeStyle = 'rgba(211, 47, 47, 0.5)';
      ctx.lineWidth = 2;
      ctx.stroke();

      // グリッド線
      ctx.strokeStyle = 'rgba(0,0,0,0.1)';
      ctx.lineWidth = 1;
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath(); ctx.moveTo(0, y * cellSize); ctx.lineTo(canvas.width, y * cellSize); ctx.stroke();
      }
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath(); ctx.moveTo(x * cellSize, 0); ctx.lineTo(x * cellSize, canvas.height); ctx.stroke();
      }

      // 最下段（配置エリア）のハイライト（Next選択時）
      if (selectedCell === 'next') {
        ctx.fillStyle = 'rgba(76, 175, 80, 0.3)';
        ctx.fillRect(0, cellSize * (ROWS - 1), canvas.width, cellSize);
      }

      // 有効な移動先のハイライト
      ctx.fillStyle = 'rgba(33, 150, 243, 0.4)';
      validMoves.forEach(m => {
        ctx.fillRect(m.x * cellSize, m.y * cellSize, cellSize, cellSize);
      });

      // 選択中の駒のハイライト
      if (selectedCell && selectedCell !== 'next') {
        ctx.fillStyle = 'rgba(255, 235, 59, 0.5)';
        ctx.fillRect(selectedCell.x * cellSize, selectedCell.y * cellSize, cellSize, cellSize);
      }

      // 駒の描画
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const p = board[y][x];
          if (p) {
            const px = x * cellSize + cellSize / 2;
            const py = y * cellSize + cellSize / 2;
            
            // 駒の形（簡易的な将棋駒の五角形風、敵は四角）
            ctx.beginPath();
            if (p.owner === 'player') {
              ctx.moveTo(px, py - cellSize*0.4);
              ctx.lineTo(px + cellSize*0.35, py - cellSize*0.1);
              ctx.lineTo(px + cellSize*0.3, py + cellSize*0.4);
              ctx.lineTo(px - cellSize*0.3, py + cellSize*0.4);
              ctx.lineTo(px - cellSize*0.35, py - cellSize*0.1);
            } else {
              ctx.rect(px - cellSize*0.4, py - cellSize*0.4, cellSize*0.8, cellSize*0.8);
            }
            ctx.closePath();
            
            if (p.type === 'block') ctx.fillStyle = '#666';
            else if (p.type === '王') ctx.fillStyle = '#444';
            else ctx.fillStyle = p.promoted ? '#ffdd99' : '#ffe6b3';
            ctx.fill();
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 文字
            let text = p.type;
            if (p.promoted && p.owner === 'player') text = '成';
            if (p.type === 'block') text = '';
            
            ctx.fillStyle = (p.promoted || p.type === '王') ? '#d32f2f' : '#000';
            if(p.type === 'block') ctx.fillStyle = '#fff'; // block hasn't text, but safe
            ctx.font = `bold ${cellSize * 0.4}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, px, py);
          }
        }
      }
    }

    // 移動可能範囲の計算
    function getValidMoves(x, y) {
      const p = board[y][x];
      let moves = [];
      if (!p || p.owner !== 'player') return moves;

      // 「成り」駒は周囲8マスの空きマスに移動可能（ジョーカー化）
      if (p.promoted) {
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            let nx = x + dx, ny = y + dy;
            if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !board[ny][nx]) {
              moves.push({x: nx, y: ny});
            }
          }
        }
        return moves;
      }

      // 通常の駒
      if (p.type === '歩') {
        if (y - 1 >= 0 && !board[y - 1][x]) moves.push({x: x, y: y - 1});
      } else if (p.type === '香') {
        for (let ny = y - 1; ny >= 0; ny--) {
          if (!board[ny][x]) moves.push({x: x, y: ny});
          else break; // 障害物でストップ
        }
      } else if (p.type === '桂') {
        if (y - 2 >= 0) {
          if (x - 1 >= 0 && !board[y - 2][x - 1]) moves.push({x: x - 1, y: y - 2}); // 左上
          if (x + 1 < COLS && !board[y - 2][x + 1]) moves.push({x: x + 1, y: y - 2}); // 右上
        }
      }
      return moves;
    }

    // ライン消去と重力（落ちコン）処理
    function checkLines() {
      let clearedAny = false;
      let hasKing = false;

      for (let y = ROWS - 1; y >= 0; y--) {
        let isFull = true;
        let rowHasKing = false;
        for (let x = 0; x < COLS; x++) {
          if (!board[y][x]) { isFull = false; break; }
          if (board[y][x].type === '王') rowHasKing = true;
        }

        if (isFull) {
          clearedAny = true;
          linesCleared++;
          if (rowHasKing) hasKing = true;

          // 上のブロックをすべて1段下に落とす（テトリスと同じ重力）
          for (let shiftY = y; shiftY > 0; shiftY--) {
            for (let x = 0; x < COLS; x++) {
              board[shiftY][x] = board[shiftY - 1][x];
            }
          }
          // 一番上を空にする
          for (let x = 0; x < COLS; x++) board[0][x] = null;
          
          y++; // 落ちてきた行をもう一度チェックするためにインデックスを戻す
        }
      }

      if (clearedAny) {
        scoreEl.textContent = `${linesCleared} LINES`;
        // 王将全消しボーナス
        if (hasKing) {
          showMessage("王将撃破！全消しボーナス！");
          for (let y = 0; y < ROWS; y++) {
            for (let x = 0; x < COLS; x++) {
              if (board[y][x] && board[y][x].owner === 'enemy') board[y][x] = null;
            }
          }
          // 全消し後にもう一度落下処理が必要な場合は再帰呼び出し
          setTimeout(checkLines, 300);
        }
        draw();
      }
    }

    function showMessage(msg) {
      messageEl.textContent = msg;
      messageEl.style.display = 'block';
      setTimeout(() => { messageEl.style.display = 'none'; }, 2000);
    }

    // 操作を確定した後の処理
    function endTurn() {
      checkLines();
      selectedCell = null;
      validMoves = [];
      canHold = true; // ターン経過でホールド権復活
      draw();
    }

    // 入力制御
    canvas.addEventListener('pointerdown', (e) => {
      if (gameState !== 'playing') return;
      const rect = canvas.getBoundingClientRect();
      const x = Math.floor((e.clientX - rect.left) / cellSize);
      const y = Math.floor((e.clientY - rect.top) / cellSize);

      if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return;

      // 1. Next駒を選択中の場合（最下段に配置）
      if (selectedCell === 'next') {
        if (y === ROWS - 1 && !board[y][x]) {
          board[y][x] = { type: nextPiece, owner: 'player', promoted: false };
          nextPiece = getRandomPiece();
          nextEl.textContent = nextPiece;
          endTurn();
        } else {
          selectedCell = null; // キャンセル
          draw();
        }
        return;
      }

      // 2. 盤面の移動先をクリックした場合
      const move = validMoves.find(m => m.x === x && m.y === y);
      if (move && selectedCell) {
        // 移動実行
        const p = board[selectedCell.y][selectedCell.x];
        board[y][x] = p;
        board[selectedCell.y][selectedCell.x] = null;
        
        // 成り判定（上3段）
        if (y <= 2) p.promoted = true;
        
        endTurn();
        return;
      }

      // 3. 盤面の自分の駒をクリックした場合（選択）
      if (board[y][x] && board[y][x].owner === 'player') {
        selectedCell = { x, y };
        validMoves = getValidMoves(x, y);
        draw();
      } else {
        selectedCell = null;
        validMoves = [];
        draw();
      }
    });

    // Next駒のタップ（配置モードへ）
    nextEl.parentElement.addEventListener('click', () => {
      if (gameState !== 'playing') return;
      selectedCell = 'next';
      validMoves = [];
      draw();
    });

    // Holdボタンのタップ
    holdBtn.addEventListener('click', () => {
      if (gameState !== 'playing' || !canHold) return;
      if (holdPiece === null) {
        holdPiece = nextPiece;
        nextPiece = getRandomPiece();
      } else {
        const temp = nextPiece;
        nextPiece = holdPiece;
        holdPiece = temp;
      }
      nextEl.textContent = nextPiece;
      holdEl.textContent = holdPiece;
      canHold = false; // 1ターンに1回まで
      selectedCell = null;
      draw();
    });

    // 敵ブロックが迫ってくる（時間経過）
    function pushDown() {
      if (gameState !== 'playing') return;

      // ゲームオーバー判定（一番下に敵ブロックがあるか）
      for (let x = 0; x < COLS; x++) {
        if (board[ROWS - 1][x] && board[ROWS - 1][x].owner === 'enemy') {
          gameState = 'gameover';
          showMessage("GAME OVER");
          clearInterval(fallInterval);
          return;
        }
      }

      // 全体を1段下げる
      for (let y = ROWS - 1; y > 0; y--) {
        for (let x = 0; x < COLS; x++) {
          board[y][x] = board[y - 1][x];
          // 自分の駒が押し出されて画面外（一番下）に行ったら消滅する
        }
      }

      // 一番上に新しいブロック行を生成
      for (let x = 0; x < COLS; x++) {
        if (Math.random() < 0.6) {
          // たまに王将
          const isKing = Math.random() < 0.1;
          board[0][x] = { type: isKing ? '王' : 'block', owner: 'enemy', promoted: false };
        } else {
          board[0][x] = null;
        }
      }

      // 押し出された後にラインが揃っているかチェック
      checkLines();
      
      // もし自分の駒が押し出されて成りゾーンから出ても、成った状態は維持される（救済措置）
      draw();
    }

    // ゲーム開始
    initBoard();
    draw();
    // 12秒ごとにブロックが迫ってくる
    fallInterval = setInterval(pushDown, 12000);

  </script>
</body>
</html>
